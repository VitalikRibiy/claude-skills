name: Build Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'build.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install packaging pyyaml --quiet

      - name: Build all skills
        run: python build.py

      - name: Commit dist/ and registry.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ registry.json
          git diff --cached --quiet || git commit -m "chore: rebuild skills [skip ci]"
          git push
