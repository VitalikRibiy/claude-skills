name: CI

on:
  pull_request:
    paths:
      - "skills/**"
      - "build.py"
      - "skillman.py"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install packaging pyyaml --quiet

      - name: Build all skills
        run: python build.py
