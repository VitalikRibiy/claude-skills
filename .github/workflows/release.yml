name: Release

on:
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "build.py"

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install packaging pyyaml --quiet

      - name: Build all skills
        run: python build.py

      - name: Commit dist/ and registry.json
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add dist/ registry.json
          git diff --cached --quiet || git commit -m "chore: rebuild dist and registry [skip ci]"
          git push
