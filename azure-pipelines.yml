trigger:
  branches:
    include:
      - main
  paths:
    include:
      - skills/**
  tags:
    include:
      - skills/*/v*

pr: none

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: "3.12"
  feedName: "claude-skills-feed"
  adoOrg: "VitaliiRibii"
  adoProject: "claude-skills"

stages:
  - stage: Build
    displayName: Build & Validate Skills
    jobs:
      - job: BuildSkills
        displayName: Package skills
        steps:
          # ── Python setup ──────────────────────────────────────────────────
          - task: UsePythonVersion@0
            displayName: Use Python $(pythonVersion)
            inputs:
              versionSpec: $(pythonVersion)
              addToPath: true

          - script: pip install packaging pyyaml --quiet
            displayName: Install Python dependencies

          # ── Build ─────────────────────────────────────────────────────────
          - script: python build.py
            displayName: Build all skills
            # build.py exits non-zero if any description exceeds 1024 chars

          # ── Publish dist/ as pipeline artifact ───────────────────────────
          - task: PublishPipelineArtifact@1
            displayName: Publish skill archives
            inputs:
              targetPath: dist/
              artifact: skills
              publishLocation: pipeline

          # ── Commit updated registry.json back to main ─────────────────────
          - script: |
              git config user.email "pipeline@dev.azure.com"
              git config user.name  "Azure Pipelines"
              git add registry.json
              git diff --cached --quiet || git commit -m "chore: rebuild registry [skip ci]"
              git push origin HEAD:main
            displayName: Commit registry.json
            env:
              GIT_ASKPASS: echo
              GIT_USERNAME: x-token
              GIT_PASSWORD: $(System.AccessToken)
            condition: and(succeeded(), eq(variables['Build.Reason'], 'IndividualCI'))

  - stage: Publish
    displayName: Publish to Artifact Feed
    dependsOn: Build
    # Only publish when a tag matching skills/*/v* is pushed
    condition: |
      and(
        succeeded(),
        startsWith(variables['Build.SourceBranch'], 'refs/tags/skills/')
      )
    jobs:
      - job: PublishFeed
        displayName: Publish skill packages to $(feedName)
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            displayName: Use Python $(pythonVersion)
            inputs:
              versionSpec: $(pythonVersion)
              addToPath: true

          - script: pip install packaging pyyaml --quiet
            displayName: Install Python dependencies

          - script: python build.py
            displayName: Rebuild skills for publish

          # Extract skill name and version from the tag for the publish task
          - script: |
              set -euo pipefail
              TAG="${BUILD_SOURCEBRANCH#refs/tags/skills/}"
              SKILL_NAME="${TAG%%/v*}"
              VERSION="${TAG##*/v}"
              echo "##vso[task.setvariable variable=skillName]$SKILL_NAME"
              echo "##vso[task.setvariable variable=skillVersion]$VERSION"
              echo "Skill: $SKILL_NAME  Version: $VERSION"
            displayName: Extract skill name and version from tag
            env:
              BUILD_SOURCEBRANCH: $(Build.SourceBranch)

          # Publish via the UniversalPackages task (uses System.AccessToken automatically)
          - task: UniversalPackages@0
            displayName: Publish to Universal Packages feed
            inputs:
              command: publish
              publishDirectory: dist/
              feedsToUsePublish: internal
              vstsFeedPublish: $(adoProject)/$(feedName)
              vstsFeedPackagePublish: $(skillName)
              versionOption: custom
              versionPublish: $(skillVersion)
              packagePublishDescription: Claude skill $(skillName) v$(skillVersion)
